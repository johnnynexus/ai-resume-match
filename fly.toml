# Fly.io config for the ResumeMatch API.
#
# Deploy from the REPO ROOT so the monorepo build can access packages/shared and
# prisma/schema.prisma:
#   fly deploy
#
# Secrets are NOT committed — set them once with `fly secrets set`:
#   fly secrets set GEMINI_API_KEY=... DATABASE_URL=... \
#     INTERNAL_API_SECRET=... ALLOWED_ORIGIN=https://your-app.vercel.app

app = "resumematch-api"
primary_region = "sjc"

[build]
  # Root build context (run `fly deploy` from the repo root); the image needs
  # packages/shared + prisma/schema.prisma.
  dockerfile = "apps/api/Dockerfile"

[deploy]
  # Runs in a one-off machine on the built image before traffic shifts — the
  # Fly equivalent of a release/pre-deploy step. Absolute --schema path because
  # the image WORKDIR is /repo/apps/api. npx resolves the bundled prisma CLI.
  release_command = "npx prisma migrate deploy --schema=/repo/prisma/schema.prisma"

[env]
  # The API reads PORT (defaults to 8080); keep it aligned with internal_port.
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle to save cost (adds a cold start on the next request).
  # Set min_machines_running = 1 for a always-warm demo.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
