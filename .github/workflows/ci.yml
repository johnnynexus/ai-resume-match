name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        # Built from the repo root so the image can access packages/shared and
        # prisma/schema.prisma (monorepo build needs the whole workspace).
        run: docker build -f apps/api/Dockerfile -t resumematch-api .

      # Pushing the image to a registry is intentionally left as a follow-up —
      # wire in registry credentials (e.g. GHCR) before enabling a push step.
